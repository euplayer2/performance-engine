<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance Engine — Organizador Diário</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #08080A;
  --bg-panel: #101014;
  --bg-card: rgba(255,255,255,0.028);
  --bg-card-hover: rgba(255,255,255,0.045);
  --border: rgba(255,255,255,0.055);
  --border-active: rgba(232,93,58,0.3);
  --text: #E2E2E8;
  --text-dim: rgba(226,226,232,0.45);
  --text-faint: rgba(226,226,232,0.25);
  --accent: #E85D3A;
  --accent-glow: rgba(232,93,58,0.15);
  --green: #2EBD6B;
  --yellow: #E8A93A;
  --blue: #3A8FE8;
  --purple: #B45CE8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --radius: 14px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
::placeholder { color: var(--text-faint); }
button { font-family: var(--sans); cursor: pointer; border: none; }
input[type="range"] { -webkit-appearance: none; appearance: none; height: 5px; border-radius: 3px; outline: none; cursor: pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); box-shadow: 0 2px 10px rgba(232,93,58,0.5); cursor: pointer; }

/* ─── Layout ─── */
.shell { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  padding: 28px 0;
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-brand {
  padding: 0 24px; margin-bottom: 32px;
}
.sidebar-brand .logo {
  font-size: 11px; font-family: var(--mono);
  color: var(--accent); letter-spacing: 3px;
  text-transform: uppercase; margin-bottom: 6px;
}
.sidebar-brand h1 {
  font-size: 19px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-nav { flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px; margin: 2px 10px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--text-dim);
  background: transparent;
  width: calc(100% - 20px);
  text-align: left;
  transition: all 0.2s;
}
.nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.nav-item.active {
  background: var(--accent-glow);
  color: var(--accent); font-weight: 700;
  border: 1px solid rgba(232,93,58,0.12);
}
.nav-item span.icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-quote {
  padding: 16px 24px; margin: 0 14px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  font-size: 12px; color: var(--text-faint);
  font-style: italic; line-height: 1.5;
}

/* Main */
.main {
  flex: 1; padding: 32px 40px 60px;
  max-width: 1100px;
}
.main-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 28px;
}
.main-header h2 {
  font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 10px;
}
.main-header .date {
  font-size: 13px; color: var(--text-dim); font-weight: 400;
}

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: border-color 0.2s;
}
.card:hover { border-color: rgba(255,255,255,0.08); }

/* Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

/* Dashboard */
.dash-top { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-card { text-align: center; padding: 18px 16px; }
.stat-card .stat-icon { font-size: 10px; color: var(--text-faint); letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.stat-card .stat-val { font-size: 28px; font-weight: 800; font-family: var(--mono); }
.stat-card .stat-sub { font-size: 10px; color: var(--text-faint); margin-top: 4px; }

/* Timer floating */
.timer-float {
  background: linear-gradient(135deg, rgba(232,93,58,0.08), rgba(232,93,58,0.02));
  border: 1px solid rgba(232,93,58,0.2);
  border-radius: var(--radius); padding: 18px 22px; margin-bottom: 20px;
}
.timer-float.over {
  background: linear-gradient(135deg, rgba(46,189,107,0.08), rgba(46,189,107,0.02));
  border-color: rgba(46,189,107,0.2);
}
.timer-float .timer-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.timer-float.over .timer-label { color: var(--green); }
.timer-float .timer-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.timer-float .timer-big { font-size: 40px; font-weight: 800; font-family: var(--mono); text-align: center; color: var(--accent); }
.timer-float.over .timer-big { color: var(--yellow); }
.timer-float .timer-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-faint); margin: 8px 0 6px; }
.timer-float .timer-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.timer-float .timer-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 1s linear; }
.timer-float.over .timer-fill { background: var(--green); }
.timer-btns { display: flex; gap: 10px; margin-top: 12px; }
.timer-btns button { flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 600; }
.btn-pause { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08) !important; color: var(--text); }
.btn-done { background: var(--green); color: #fff; }

/* Task row */
.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius-sm);
  background: var(--bg-card); border: 1px solid var(--border);
  margin-bottom: 8px; transition: all 0.2s;
  border-left: 3px solid transparent;
}
.task-row:hover { background: var(--bg-card-hover); }
.task-row.active { background: rgba(232,93,58,0.04); border-color: rgba(232,93,58,0.15); }
.task-row .check-btn {
  width: 24px; height: 24px; border-radius: 7px;
  border: 2px solid rgba(255,255,255,0.08);
  background: transparent; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.task-row .check-btn.ready { border-color: rgba(46,189,107,0.4); color: var(--green); cursor: pointer; }
.task-row .check-btn.locked { color: rgba(255,255,255,0.1); cursor: not-allowed; }
.task-info { flex: 1; min-width: 0; }
.task-info .task-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.task-info .task-meta { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-dim); flex-wrap: wrap; }
.task-info .task-meta .mono { font-family: var(--mono); font-size: 11px; }
.task-actions { display: flex; gap: 6px; }
.task-actions button {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border) !important;
  color: var(--text-dim); font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-actions button:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.task-actions button.playing { background: var(--accent-glow); color: var(--accent); border-color: rgba(232,93,58,0.2) !important; }

/* Done row */
.done-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; border-radius: var(--radius-sm);
  background: rgba(46,189,107,0.025); border: 1px solid rgba(46,189,107,0.06);
  margin-bottom: 6px;
}
.done-row .check-done {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--green); color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none;
}
.done-row .task-name { font-size: 13px; text-decoration: line-through; color: var(--text-dim); }

/* Form */
.form-label {
  display: block; font-size: 11px; color: var(--text-dim);
  font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 8px;
}
.form-input {
  width: 100%; padding: 13px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(255,255,255,0.03);
  color: var(--text); font-size: 15px; font-family: var(--sans); outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: rgba(232,93,58,0.3); }
.chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent; color: var(--text-dim);
  font-size: 12px; transition: all 0.2s;
}
.chip.on { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: 600; }
.btn-submit {
  width: 100%; padding: 14px; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  transition: all 0.3s;
}
.btn-submit.ready { background: linear-gradient(135deg, var(--accent), #E88A3A); color: #fff; box-shadow: 0 4px 20px rgba(232,93,58,0.3); }
.btn-submit.disabled { background: rgba(255,255,255,0.04); color: var(--text-faint); cursor: default; }

/* Toggle done */
.toggle-done {
  width: 100%; padding: 9px; border-radius: 8px;
  background: rgba(46,189,107,0.03); border: 1px solid rgba(46,189,107,0.08) !important;
  color: var(--green); font-size: 12px; margin-top: 8px;
}

/* Efficiency card */
.eff-card { text-align: center; }
.eff-card .eff-big { font-size: 42px; font-weight: 800; font-family: var(--mono); }
.eff-card .eff-sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.eff-cols { display: flex; justify-content: center; gap: 24px; margin-top: 14px; font-size: 12px; }
.eff-cols .ec-label { color: var(--text-faint); margin-bottom: 2px; }
.eff-cols .ec-val { font-weight: 700; font-family: var(--mono); }
.eff-sep { width: 1px; background: var(--border); }

/* Category bar */
.cat-row { margin-bottom: 12px; }
.cat-row .cat-head { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
.cat-row .cat-bar { height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
.cat-row .cat-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

/* Per-task row */
.ptask { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 12px; }
.ptask .ptask-name { flex: 1; color: var(--text-dim); }
.ptask .ptask-time { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-right: 10px; }
.ptask .ptask-pct { font-family: var(--mono); font-weight: 700; min-width: 52px; text-align: right; }

/* Streak */
.streak-card { text-align: center; }
.streak-card .streak-icon { font-size: 40px; margin-bottom: 4px; }
.streak-card .streak-num { font-size: 32px; font-weight: 800; font-family: var(--mono); color: var(--accent); }
.streak-card .streak-label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* Empty */
.empty { text-align: center; padding: 50px 20px; }
.empty .empty-icon { font-size: 44px; margin-bottom: 10px; }
.empty .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.empty .empty-sub { font-size: 13px; color: var(--text-faint); }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(232,93,58,0.95); color: #fff; padding: 10px 24px;
  border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 9999;
  box-shadow: 0 4px 24px rgba(232,93,58,0.4);
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { transform: translateX(-50%) translateY(-16px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px 16px 90px; }
  .mobile-nav {
    display: flex !important;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(16,16,20,0.95); backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding: 8px 0 env(safe-area-inset-bottom, 8px);
    z-index: 100;
  }
  .mobile-nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0; background: transparent; color: var(--text-faint);
    font-size: 10px; font-weight: 400;
  }
  .mobile-nav button.active { color: var(--accent); font-weight: 700; }
  .mobile-nav button .mn-icon { font-size: 20px; }
  .dash-top { grid-template-columns: 1fr; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
  .main-header h2 { font-size: 20px; }
}
@media (min-width: 769px) {
  .mobile-nav { display: none !important; }
}

/* Ambient glow */
body::before {
  content: ''; position: fixed; top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(232,93,58,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.shell { position: relative; z-index: 1; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── State ───
const STORAGE = "perf-engine-web-v1";
const CATEGORIES = {
  work: { label: "Trabalho", icon: "💼", color: "#E85D3A" },
  study: { label: "Estudo", icon: "📚", color: "#3A8FE8" },
  health: { label: "Saúde", icon: "🏃", color: "#2EBD6B" },
  personal: { label: "Pessoal", icon: "🧘", color: "#B45CE8" },
  home: { label: "Casa", icon: "🏠", color: "#E8A93A" },
};
const PRIORITIES = {
  high: { label: "Alta", color: "#E85D3A", weight: 3 },
  medium: { label: "Média", color: "#E8A93A", weight: 2 },
  low: { label: "Baixa", color: "#3A8FE8", weight: 1 },
};
const MOTIV = [
  "Cada tarefa concluída é uma vitória.",
  "Foco no progresso, não na perfeição.",
  "Seu eu do futuro agradece agora.",
  "A disciplina supera a motivação.",
  "Comece. A motivação vem depois.",
  "Você é mais capaz do que imagina.",
];

let state = {
  tasks: [], availableTime: 480, tab: "tasks",
  newTask: { title: "", category: "work", priority: "medium", duration: 30, recurring: false },
  showDone: false, activeTimer: null, timerSec: 0, toast: null,
  editingId: null, editData: null,
  motivation: MOTIV[Math.floor(Math.random() * MOTIV.length)],
  dayDate: new Date().toISOString().split("T")[0],
};

// Load
try { const s = localStorage.getItem(STORAGE); if (s) { const d = JSON.parse(s); state.tasks = d.tasks || []; state.availableTime = d.availableTime || 480; } } catch {}

function save() { try { localStorage.setItem(STORAGE, JSON.stringify({ tasks: state.tasks, availableTime: state.availableTime })); } catch {} }

// ─── Helpers ───
const uid = () => Math.random().toString(36).slice(2, 9);
const fmt = (m) => { if (m < 60) return m + "min"; const h = Math.floor(m/60), r = m%60; return r ? h+"h"+r : h+"h"; };
const fmtS = (s) => String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
const fmtS2M = (s) => fmt(Math.round(s/60));

function flash(msg) { state.toast = msg; render(); setTimeout(() => { state.toast = null; render(); }, 2500); }

function playCompleteSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i * 0.12 + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.5);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.5);
    });
    setTimeout(() => ctx.close(), 1500);
  } catch {}
}

// Timer
let timerInterval = null;
function startTick() { if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if (state.activeTimer) { state.timerSec++; render(); } }, 1000); }
function stopTick() { clearInterval(timerInterval); timerInterval = null; }

// ─── Actions ───
function setTab(t) { state.tab = t; render(); }

function addTask() {
  const n = state.newTask;
  if (!n.title.trim()) return;
  state.tasks.push({ id: uid(), ...n, date: state.dayDate, completed: false, createdAt: Date.now(), timerStarted: false, actualSeconds: 0 });
  state.newTask = { title: "", category: "work", priority: "medium", duration: 30, recurring: false };
  state.tab = "tasks"; save(); flash("✅ Tarefa adicionada!"); render();
}

function completeTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t || !t.timerStarted) { flash("⏱ Inicie o timer antes!"); return; }
  let sec = t.actualSeconds || 0;
  if (state.activeTimer === id) { sec += state.timerSec; state.activeTimer = null; state.timerSec = 0; stopTick(); }
  t.completed = true; t.actualSeconds = sec; save(); playCompleteSound(); render();
}

function uncomplete(id) { const t = state.tasks.find(x => x.id === id); if (t) { t.completed = false; save(); render(); } }

function delTask(id) { state.tasks = state.tasks.filter(t => t.id !== id); if (state.activeTimer === id) { state.activeTimer = null; state.timerSec = 0; stopTick(); } if (state.editingId === id) { state.editingId = null; state.editData = null; } save(); render(); }

function startEdit(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  state.editingId = id;
  state.editData = { title: t.title, category: t.category, priority: t.priority, duration: t.duration, recurring: t.recurring };
  render();
  setTimeout(() => { const el = document.getElementById('edit-input'); if (el) el.focus(); }, 50);
}
function saveEdit() {
  if (!state.editData || !state.editingId) return;
  if (!state.editData.title.trim()) { flash("Digite um nome"); return; }
  const t = state.tasks.find(x => x.id === state.editingId);
  if (t) Object.assign(t, state.editData);
  state.editingId = null; state.editData = null;
  save(); flash("✏️ Tarefa atualizada!"); render();
}
function cancelEdit() { state.editingId = null; state.editData = null; render(); }
function setEditField(field, val) { if (state.editData) { state.editData[field] = val; render(); setTimeout(() => { const el = document.getElementById('edit-input'); if (el) el.focus(); }, 50); } }

function toggleTimer(id) {
  if (state.activeTimer === id) {
    const t = state.tasks.find(x => x.id === id);
    if (t) t.actualSeconds = (t.actualSeconds || 0) + state.timerSec;
    state.activeTimer = null; state.timerSec = 0; stopTick();
  } else {
    if (state.activeTimer) { const old = state.tasks.find(x => x.id === state.activeTimer); if (old) old.actualSeconds = (old.actualSeconds || 0) + state.timerSec; }
    const t = state.tasks.find(x => x.id === id); if (t) t.timerStarted = true;
    state.activeTimer = id; state.timerSec = 0; startTick();
  }
  save(); render();
}

function resetAll() { if (!confirm("Limpar todos os dados?")) return; state.tasks = []; state.availableTime = 480; localStorage.removeItem(STORAGE); render(); }

// ─── Derived ───
function derived() {
  const d = state.dayDate;
  const todayT = state.tasks.filter(t => t.date === d);
  const pending = todayT.filter(t => !t.completed);
  const done = todayT.filter(t => t.completed);
  const sorted = [...pending].sort((a,b) => { const w = PRIORITIES[b.priority].weight - PRIORITIES[a.priority].weight; return w || a.duration - b.duration; });
  const totalPlan = todayT.reduce((s,t) => s + t.duration, 0);
  const totalRealSec = done.reduce((s,t) => s + (t.actualSeconds||0), 0);
  const totalEstSec = done.reduce((s,t) => s + t.duration*60, 0);
  const saved = totalEstSec - totalRealSec;
  const doneMin = done.reduce((s,t) => s + t.duration, 0);
  const freeMin = state.availableTime - totalPlan;
  const pctDone = state.availableTime > 0 ? Math.min((doneMin / state.availableTime)*100, 100) : 0;
  const rate = todayT.length ? Math.round((done.length / todayT.length)*100) : 0;
  const eff = totalEstSec > 0 ? Math.round((saved/totalEstSec)*100) : 0;
  // Streak
  const ds = [...new Set(state.tasks.filter(t=>t.completed).map(t=>t.date))].sort().reverse();
  let streak = 0, dd = new Date();
  for (let i=0;i<30;i++) { const c = dd.toISOString().split("T")[0]; if(ds.includes(c)){streak++;dd.setDate(dd.getDate()-1);}else if(i===0){dd.setDate(dd.getDate()-1);}else break; }
  return { todayT, pending, done, sorted, totalPlan, totalRealSec, totalEstSec, saved, doneMin, freeMin, pctDone, rate, eff, streak };
}

// ─── Render ───
function render() {
  const D = derived();
  const today = new Date();
  const dateStr = today.toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" });

  let html = `<div class="shell">`;

  // Sidebar
  html += `<aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">⚡ Performance Engine</div>
      <h1>Seu Dia, Otimizado</h1>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item ${state.tab==='tasks'?'active':''}" onclick="setTab('tasks')"><span class="icon">📋</span>Tarefas</button>
      <button class="nav-item ${state.tab==='add'?'active':''}" onclick="setTab('add')"><span class="icon">➕</span>Adicionar</button>
      <button class="nav-item ${state.tab==='stats'?'active':''}" onclick="setTab('stats')"><span class="icon">📊</span>Estatísticas</button>
    </nav>
    <div class="sidebar-quote">"${state.motivation}"</div>
  </aside>`;

  html += `<main class="main">`;

  // Toast
  if (state.toast) html += `<div class="toast">${state.toast}</div>`;

  // Active timer (global)
  if (state.activeTimer) {
    const t = state.tasks.find(x => x.id === state.activeTimer);
    if (t) {
      const acc = (t.actualSeconds||0) + state.timerSec, est = t.duration*60;
      const rem = Math.max(est - acc, 0), over = acc > est, overS = acc - est;
      const pct = Math.min((acc/est)*100, 100);
      html += `<div class="timer-float ${over?'over':''}">
        <div class="timer-label">${over ? '⚡ Prazo atingido' : '⏱ Focando'}</div>
        <div class="timer-title">${t.title}</div>
        ${!over
          ? `<div class="timer-big">${fmtS(rem)}</div>`
          : `<div style="text-align:center"><div style="color:var(--green);font-size:13px">✅ No prazo!</div><div class="timer-big">+${fmtS(overS)}</div></div>`
        }
        <div class="timer-meta"><span>Real: ${fmtS(acc)}</span><span>Est: ${fmt(t.duration)}</span></div>
        <div class="timer-bar"><div class="timer-fill" style="width:${pct}%"></div></div>
        <div class="timer-btns">
          <button class="btn-pause" onclick="toggleTimer('${t.id}')">⏸ Pausar</button>
          <button class="btn-done" onclick="completeTask('${t.id}')">Concluir ✓</button>
        </div>
      </div>`;
    }
  }

  // ─── TASKS TAB ───
  if (state.tab === "tasks") {
    html += `<div class="main-header"><h2>📋 Minhas Tarefas</h2><span class="date">${dateStr}</span></div>`;

    // Top cards
    html += `<div class="dash-top">`;
    // Time slider
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:600">Tempo hoje</span>
        <span style="font-size:22px;font-weight:700;color:var(--accent);font-family:var(--mono)">${fmt(state.availableTime)}</span>
      </div>
      <input type="range" min="30" max="960" step="15" value="${state.availableTime}" oninput="state.availableTime=+this.value;save();render()"
        style="width:100%;background:linear-gradient(to right,var(--accent) ${(state.availableTime/960)*100}%,rgba(255,255,255,0.06) ${(state.availableTime/960)*100}%)">
    </div>`;
    // Progress
    const barCol = D.pctDone >= 80 ? 'var(--green)' : D.pctDone >= 40 ? 'var(--yellow)' : 'var(--accent)';
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">Progresso</span>
        <span style="font-size:20px;font-weight:800;font-family:var(--mono);color:${barCol}">${D.rate}%</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${D.pctDone}%;background:${barCol};border-radius:3px;transition:width 0.5s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text-faint)">
        <span>${D.done.length}/${D.todayT.length} • Real: ${fmtS2M(D.totalRealSec)}</span>
        <span>${D.freeMin>=0?fmt(D.freeMin)+' livre':'⚠ '+fmt(-D.freeMin)+' extra'}</span>
      </div>
      ${D.saved>0 && D.done.length ? `<div style="margin-top:8px;padding:5px 10px;border-radius:6px;background:rgba(46,189,107,0.06);border:1px solid rgba(46,189,107,0.12);font-size:11px;color:var(--green);text-align:center">⚡ ${fmtS2M(D.saved)} ganhos — ${D.eff}% mais rápido</div>` : ''}
      ${D.streak>0?`<div style="margin-top:6px;font-size:10px;color:var(--text-faint);text-align:center">🔥 ${D.streak} dias consecutivos</div>`:''}
    </div>`;
    html += `</div>`;

    // Task list
    if (D.sorted.length === 0 && D.done.length === 0) {
      html += `<div class="card empty"><div class="empty-icon">🚀</div><div class="empty-title">Nenhuma tarefa</div><div class="empty-sub">Clique em <strong>Adicionar</strong> para começar</div></div>`;
    } else {
      if (D.sorted.length) html += `<div style="font-size:10px;color:var(--text-faint);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase">🔒 Inicie o timer (▶) para poder concluir</div>`;
      D.sorted.forEach(t => {
        const c = CATEGORIES[t.category], p = PRIORITIES[t.priority];
        const active = state.activeTimer === t.id;
        const acc = (t.actualSeconds||0) + (active ? state.timerSec : 0);
        const started = t.timerStarted;
        const isEditing = state.editingId === t.id;

        if (isEditing && state.editData) {
          const ed = state.editData;
          html += `<div class="task-row" style="border-left-color:${PRIORITIES[ed.priority].color};border-color:rgba(58,143,232,0.3);background:rgba(58,143,232,0.04);display:block;padding:16px">
            <div style="font-size:10px;color:#3A8FE8;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">✏️ Editando tarefa</div>
            <input id="edit-input" class="form-input" value="${ed.title.replace(/"/g,'&quot;')}" oninput="state.editData.title=this.value"
              onkeydown="if(event.key==='Enter')saveEdit();if(event.key==='Escape')cancelEdit()"
              style="margin-bottom:10px;border-color:rgba(58,143,232,0.3)">
            <div class="chip-group" style="margin-bottom:8px">
              ${Object.entries(CATEGORIES).map(([k,cv])=>`<button class="chip ${ed.category===k?'on':''}" style="${ed.category===k?'border-color:'+cv.color+';background:'+cv.color+'15;color:'+cv.color:''}" onclick="setEditField('category','${k}')">${cv.icon} ${cv.label}</button>`).join('')}
            </div>
            <div class="chip-group" style="margin-bottom:8px">
              ${Object.entries(PRIORITIES).map(([k,pv])=>`<button class="chip ${ed.priority===k?'on':''}" style="${ed.priority===k?'border-color:'+pv.color+';background:'+pv.color+'15;color:'+pv.color:''}" onclick="setEditField('priority','${k}')">${pv.label}</button>`).join('')}
            </div>
            <div class="chip-group" style="margin-bottom:12px">
              ${[15,30,45,60,90,120].map(d=>`<button class="chip ${ed.duration===d?'on':''}" style="font-family:var(--mono);${ed.duration===d?'border-color:var(--accent);background:var(--accent-glow);color:var(--accent)':''}" onclick="setEditField('duration',${d})">${fmt(d)}</button>`).join('')}
            </div>
            <div style="display:flex;gap:8px">
              <button style="flex:1;padding:9px;border-radius:8px;background:#3A8FE8;color:#fff;font-size:13px;font-weight:600" onclick="saveEdit()">Salvar ✓</button>
              <button style="flex:1;padding:9px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:13px" onclick="cancelEdit()">Cancelar</button>
            </div>
          </div>`;
        } else {
          html += `<div class="task-row ${active?'active':''}" style="border-left-color:${p.color}">
            <button class="check-btn ${started?'ready':'locked'}" onclick="completeTask('${t.id}')" title="${started?'Concluir':'Inicie o timer'}">${started?'✓':'🔒'}</button>
            <div class="task-info">
              <div class="task-name">${t.title}</div>
              <div class="task-meta">
                <span style="color:${c.color}">${c.icon} ${c.label}</span>
                <span style="color:var(--text-faint)">•</span>
                <span class="mono">${fmt(t.duration)}</span>
                ${acc > 0 ? `<span style="color:var(--text-faint)">•</span><span class="mono" style="color:${acc > t.duration*60 ? 'var(--yellow)' : 'var(--green)'};font-weight:600">${fmtS(acc)}</span>` : ''}
              </div>
            </div>
            <div class="task-actions">
              <button class="${active?'playing':''}" onclick="toggleTimer('${t.id}')">${active?'⏸':'▶'}</button>
              <button onclick="startEdit('${t.id}')" title="Editar">✏️</button>
              <button onclick="delTask('${t.id}')">✕</button>
            </div>
          </div>`;
        }
      });

      if (D.done.length) {
        html += `<button class="toggle-done" onclick="state.showDone=!state.showDone;render()">✅ ${D.done.length} concluída${D.done.length>1?'s':''} ${state.showDone?'▲':'▼'}</button>`;
        if (state.showDone) {
          D.done.forEach(t => {
            const c = CATEGORIES[t.category], est = t.duration*60, real = t.actualSeconds||0, diff = est - real;
            html += `<div class="done-row">
              <button class="check-done" onclick="uncomplete('${t.id}')">✓</button>
              <div style="flex:1">
                <div class="task-name">${t.title}</div>
                <div style="font-size:10px;color:var(--text-faint);display:flex;gap:6px;flex-wrap:wrap">
                  <span>${c.icon} ${c.label}</span><span>•</span>
                  <span style="font-family:var(--mono)">Est: ${fmt(t.duration)}</span><span>•</span>
                  <span style="font-family:var(--mono);color:var(--green)">Real: ${fmtS2M(real)}</span>
                  ${diff>0?`<span style="color:var(--green);font-weight:600">⚡-${fmtS2M(diff)}</span>`:''}
                  ${diff<0?`<span style="color:var(--yellow);font-weight:600">🐢+${fmtS2M(-diff)}</span>`:''}
                </div>
              </div>
              <button style="background:transparent;color:var(--text-faint);font-size:11px" onclick="delTask('${t.id}')">✕</button>
            </div>`;
          });
        }
      }
    }
  }

  // ─── ADD TAB ───
  if (state.tab === "add") {
    const n = state.newTask;
    html += `<div class="main-header"><h2>➕ Nova Tarefa</h2></div>`;
    html += `<div class="card" style="max-width:560px">`;

    html += `<label class="form-label">Nome da tarefa</label>
      <input class="form-input" value="${n.title.replace(/"/g,'&quot;')}" placeholder="Ex: Revisar relatório trimestral"
        oninput="state.newTask.title=this.value" onkeydown="if(event.key==='Enter')addTask()" style="margin-bottom:20px">`;

    html += `<label class="form-label">Categoria</label><div class="chip-group" style="margin-bottom:20px">`;
    Object.entries(CATEGORIES).forEach(([k,c]) => {
      html += `<button class="chip ${n.category===k?'on':''}" style="${n.category===k?'border-color:'+c.color+';background:'+c.color+'18;color:'+c.color:''}" onclick="state.newTask.category='${k}';render()">${c.icon} ${c.label}</button>`;
    });
    html += `</div>`;

    html += `<label class="form-label">Prioridade</label><div class="chip-group" style="margin-bottom:20px">`;
    Object.entries(PRIORITIES).forEach(([k,p]) => {
      html += `<button class="chip ${n.priority===k?'on':''}" style="${n.priority===k?'border-color:'+p.color+';background:'+p.color+'18;color:'+p.color:''}" onclick="state.newTask.priority='${k}';render()">${p.label}</button>`;
    });
    html += `</div>`;

    html += `<label class="form-label">Duração estimada: <span style="color:var(--accent);font-family:var(--mono)">${fmt(n.duration)}</span></label><div class="chip-group" style="margin-bottom:20px">`;
    [15,30,45,60,90,120].forEach(d => {
      html += `<button class="chip ${n.duration===d?'on':''}" style="font-family:var(--mono);${n.duration===d?'border-color:var(--accent);background:var(--accent-glow);color:var(--accent)':''}" onclick="state.newTask.duration=${d};render()">${fmt(d)}</button>`;
    });
    html += `</div>`;

    html += `<label style="display:flex;align-items:center;gap:8px;margin-bottom:22px;font-size:13px;color:var(--text-dim);cursor:pointer">
      <input type="checkbox" ${n.recurring?'checked':''} onchange="state.newTask.recurring=this.checked" style="accent-color:var(--accent)"> Tarefa recorrente
    </label>`;

    html += `<button class="btn-submit ${n.title.trim()?'ready':'disabled'}" onclick="addTask()">Adicionar Tarefa</button>`;
    html += `</div>`;
  }

  // ─── STATS TAB ───
  if (state.tab === "stats") {
    html += `<div class="main-header"><h2>📊 Estatísticas</h2><span class="date">${dateStr}</span></div>`;

    html += `<div class="grid-4" style="margin-bottom:16px">`;
    [{l:"Tarefas",v:D.todayT.length,i:"📋"},{l:"Concluídas",v:D.done.length,i:"✅"},{l:"Estimado",v:fmt(D.totalPlan),i:"📐"},{l:"Tempo Real",v:fmtS2M(D.totalRealSec),i:"⏱"}].forEach(s => {
      html += `<div class="card stat-card"><div class="stat-icon">${s.i} ${s.l}</div><div class="stat-val">${s.v}</div></div>`;
    });
    html += `</div>`;

    if (D.done.length) {
      const col = D.saved >= 0 ? 'var(--green)' : 'var(--yellow)';
      html += `<div class="card eff-card" style="margin-bottom:16px;background:${D.saved>=0?'linear-gradient(135deg,rgba(46,189,107,0.06),rgba(46,189,107,0.01))':'linear-gradient(135deg,rgba(232,169,58,0.06),rgba(232,93,58,0.01))'};border-color:${D.saved>=0?'rgba(46,189,107,0.12)':'rgba(232,169,58,0.12)'}">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px">⚡ Eficiência</div>
        <div class="eff-big" style="color:${col}">${D.saved>=0?'+':'-'}${fmtS2M(Math.abs(D.saved))}</div>
        <div class="eff-sub">${D.saved>=0?'de tempo ganho':'além do estimado'}</div>
        <div class="eff-cols">
          <div><div class="ec-label">Estimado</div><div class="ec-val">${fmtS2M(D.totalEstSec)}</div></div>
          <div class="eff-sep"></div>
          <div><div class="ec-label">Real</div><div class="ec-val">${fmtS2M(D.totalRealSec)}</div></div>
          <div class="eff-sep"></div>
          <div><div class="ec-label">Taxa</div><div class="ec-val" style="color:${col}">${Math.abs(D.eff)}% <span style="font-size:9px">${D.saved>=0?'rápido':'lento'}</span></div></div>
        </div>
        <div style="margin-top:16px;text-align:left">
          <div style="font-size:10px;color:var(--text-faint);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Por tarefa</div>
          ${D.done.map(t => {
            const e2=t.duration*60, r=t.actualSeconds||0, d2=e2-r, p2=e2>0?Math.round((d2/e2)*100):0;
            return `<div class="ptask"><span class="ptask-name">${t.title}</span><span class="ptask-time">${fmtS2M(r)}/${fmt(t.duration)}</span><span class="ptask-pct" style="color:${d2>0?'var(--green)':d2<0?'var(--yellow)':'var(--text-faint)'}">${d2>0?'⚡'+p2+'%':d2<0?'🐢'+Math.abs(p2)+'%':'='}</span></div>`;
          }).join('')}
        </div>
      </div>`;
    }

    // Categories
    html += `<div class="card" style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px">Por Categoria</div>`;
    Object.entries(CATEGORIES).forEach(([k,c]) => {
      const ct = D.todayT.filter(t=>t.category===k), cd = ct.filter(t=>t.completed), rs = cd.reduce((s,t)=>s+(t.actualSeconds||0),0);
      if (!ct.length) return;
      html += `<div class="cat-row">
        <div class="cat-head"><span style="color:${c.color};font-weight:600">${c.icon} ${c.label}</span><span style="font-family:var(--mono);color:var(--text-faint)">${cd.length}/${ct.length} • ${fmtS2M(rs)}</span></div>
        <div class="cat-bar"><div class="cat-fill" style="width:${(cd.length/ct.length)*100}%;background:${c.color}"></div></div>
      </div>`;
    });
    html += `</div>`;

    // Streak + Reset
    html += `<div class="grid-2" style="margin-bottom:16px">
      <div class="card streak-card"><div class="streak-icon">🔥</div><div class="streak-num">${D.streak}</div><div class="streak-label">dias consecutivos</div></div>
      <div class="card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px">
        <div style="font-size:12px;color:var(--text-faint)">Gerenciar dados</div>
        <button style="padding:8px 20px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--text-faint);font-size:12px" onclick="resetAll()">🗑 Resetar tudo</button>
      </div>
    </div>`;
  }

  html += `</main></div>`;

  // Mobile nav
  html += `<div class="mobile-nav">
    <button class="${state.tab==='tasks'?'active':''}" onclick="setTab('tasks')"><span class="mn-icon">📋</span>Tarefas</button>
    <button class="${state.tab==='add'?'active':''}" onclick="setTab('add')"><span class="mn-icon">➕</span>Adicionar</button>
    <button class="${state.tab==='stats'?'active':''}" onclick="setTab('stats')"><span class="mn-icon">📊</span>Estatísticas</button>
  </div>`;

  document.getElementById("app").innerHTML = html;
}

render();
</script>
</body>
</html>
